<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapTiler Streets v4 Preview</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }

    .map-marker {
      background: #FF385C;
      width: 32px;
      height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2.5px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .key-notice {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 12px;
      padding: 12px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-size: 13px;
      color: #333;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .key-notice input {
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      width: 240px;
      outline: none;
    }

    .key-notice input:focus {
      border-color: #FF385C;
    }

    .key-notice button {
      background: #FF385C;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .key-notice button:hover {
      background: #e0304f;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="key-notice">
    <span>🔑 API Key MapTiler:</span>
    <input type="text" id="apiKeyInput" placeholder="Paste API key kamu di sini" />
    <button onclick="applyKey()">Terapkan</button>
  </div>

  <script>
    const CENTER = [-7.983908, 112.621391];
    const ZOOM = 14;

    const map = L.map('map', {
      center: CENTER,
      zoom: ZOOM,
      zoomControl: true,
    });

    let tileLayer = null;

    function loadTile(apiKey) {
      if (tileLayer) map.removeLayer(tileLayer);

      tileLayer = L.tileLayer(
        `https://api.maptiler.com/maps/streets-v4/{z}/{x}/{y}@2x.png?key=${apiKey}`,
        {
          attribution: '© <a href="https://www.maptiler.com">MapTiler</a> © <a href="https://www.openstreetmap.org">OpenStreetMap</a>',
          tileSize: 512,
          zoomOffset: -1,
          maxZoom: 20,
        }
      ).addTo(map);
    }

    function applyKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return;
      loadTile(key);
    }

    // Marker ala Airbnb
    const icon = L.divIcon({
      html: '<div class="map-marker"></div>',
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      className: ''
    });

    L.marker(CENTER, { icon }).addTo(map);

    // Load dengan placeholder dulu (fallback ke OSM)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);
  </script>

</body>
</html>

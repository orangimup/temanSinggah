<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalender | Teman Singgah</title>
    <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />

    <link rel="stylesheet" href="/components/root.css" />
    <link rel="stylesheet" href="/components/navbar.css" />
    <link rel="stylesheet" href="/host/dashboard/styles/calendar_router.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet" />

    <script
      type="module"
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" />
  </head>

  <body>
    <header class="navbar">
      <nav class="navbar-container">
        <a href="reservations.html" class="logo-section">
          <img
            src="/assets/logo/logo_temansinggah.svg"
            alt="Logo Teman Singgah"
            class="logo-icon" />
          <img
            src="/assets/logo/label_temansinggah.svg"
            alt="Brand Name Teman Singgah"
            class="logo-name" />
        </a>
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="reservations.html" class="nav-link">Reservasi</a>
          </li>
          <li class="nav-item">
            <a href="calendar_router.html" class="nav-link active">Kalender</a>
          </li>
          <li class="nav-item">
            <a href="listing.html" class="nav-link">Listing</a>
          </li>
          <li class="nav-item">
            <a href="messages.html" class="nav-link">Pesan</a>
          </li>
        </ul>
        <div class="nav-right">
          <button class="ghost-button">Ganti ke tamu</button>
          <div class="icon-buttons">
            <button class="icon-button profile" aria-label="Profile">A</button>
            <button
              class="icon-button hamburger"
              aria-label="Hamburger"
              style="display: none">
              <i class="ph-bold ph-list"></i>
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <section class="calendar-area">
        <div class="content-header">
          <span class="content-title">
            <h2>Mei</h2>
            <i class="ph-bold ph-caret-down"></i>
          </span>
          <button class="header-filter">
            <span class="filter-value">Bulan</span>
            <i class="ph-bold ph-caret-down"></i>
          </button>
        </div>

        <div class="calendar-container">
        </div>
      </section>

      <aside class="settings-sidebar">
        <button class="panel-card button" aria-label="Buka pengaturan harga">
          <div class="panel-card-info">
            <div class="panel-card-title">Pengaturan harga</div>
            <div class="panel-card-detail">
              <span>Rp399.344 per malam</span>
              <span>Rp423.305 harga akhir pekan</span>
              <span>Diskon mingguan 11%</span>
            </div>
          </div>
          <i class="ph-bold ph-caret-right"></i>
        </button>

        <button
          class="panel-card button"
          aria-label="Buka pengaturan ketersediaan">
          <div class="panel-card-info">
            <div class="panel-card-title">Pengaturan ketersediaan</div>
            <div class="panel-card-detail">
              <span>1 – 1 malam minimal menginap</span>
              <span>Pemberitahuan hari yang sama</span>
            </div>
          </div>
          <i class="ph-bold ph-caret-right"></i>
        </button>

        <button
          class="panel-card button"
          aria-label="Buka aturan kedatangan & keberangkatan">
          <div class="panel-card-info">
            <div class="panel-card-title">Kedatangan & keberangkatan</div>
            <div class="panel-card-detail">
              <span>Fleksibel – semua hari</span>
              <span>Check-in: 14.00 – 22.00</span>
            </div>
          </div>
          <i class="ph-bold ph-caret-right"></i>
        </button>

        <div class="panel-card">
          <div class="legend-section">
            <div class="legend-title">Keterangan</div>
            <div class="legend-items">
              <div class="legend-item">
                <div class="legend-swatch available"></div>
                <span>Tersedia</span>
              </div>
              <div class="legend-item">
                <div class="legend-swatch booked"></div>
                <span>Sudah dipesan</span>
              </div>
              <div class="legend-item">
                <div class="legend-swatch blocked"></div>
                <span>Diblokir</span>
              </div>
              <div class="legend-item">
                <div class="legend-swatch today"></div>
                <span>Hari ini</span>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <aside class="listing-sidebar" id="listingSidebar">
        <div class="listing-sidebar-header">
          <span class="listing-sidebar-title">Listing</span>
          <button class="listing-sidebar-close">
            <i class="ph-bold ph-x"></i>
          </button>
        </div>
        <div class="listing-sidebar-list">
          <div class="listing-sidebar-item active">
            <img
              src="/assets/images/apurva_kempinski_bali.jpg"
              class="listing-sidebar-img"
              alt="Apurva Kempinski" />
            <span class="listing-sidebar-name">Apurva Kempinski</span>
          </div>
          <div class="listing-sidebar-item">
            <img
              src="/assets/images/nihi_sumba.webp"
              class="listing-sidebar-img"
              alt="Nihi Sumba" />
            <span class="listing-sidebar-name">Nihi Sumba</span>
          </div>
          <div class="listing-sidebar-item">
            <img
              src="/assets/images/padma_resort_ubud_bali.jpg"
              class="listing-sidebar-img"
              alt="Padma Resort" />
            <span class="listing-sidebar-name">Padma Resort</span>
          </div>
        </div>
      </aside>

      <template id="weekdayHeaderTemplate">
        <div class="weekday-header">
          <div class="weekday-label">Min</div>
          <div class="weekday-label">Sen</div>
          <div class="weekday-label">Sel</div>
          <div class="weekday-label">Rab</div>
          <div class="weekday-label">Kam</div>
          <div class="weekday-label">Jum</div>
          <div class="weekday-label">Sab</div>
        </div>
      </template>

      <template id="monthSectionTemplate">
        <div class="month-section">
          <div class="month-label"></div>
          <div class="day-grid"></div>
        </div>
      </template>

      <template id="dayCardTemplate">
        <div class="day-card">
          <span class="day-number"></span>
          <span class="day-price"></span>
        </div>
      </template>

      <template id="dayCardStatusTemplate">
        <div class="day-card">
          <div class="day-status-dot"></div>
          <span class="day-number"></span>
          <span class="day-price"></span>
        </div>
      </template>

      <template id="dayCardEmptyTemplate">
        <div class="day-card day-empty"></div>
      </template>
    </main>

    <script src="/host/dashboard/scripts/calendar_router.js"></script>
  </body>
</html>

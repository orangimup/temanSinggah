<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambahkan Diskon | Teman Singgah</title>
    <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />

    <link rel="stylesheet" href="/components/root.css" />
    <link rel="stylesheet" href="/host/onboarding/onboarding.css" />
    
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <script
      type="module"
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  </head>

  <body class="onboarding-page">
    <header class="onboarding-header">
      <nav class="onboarding-nav">
        <a href="/index.html" class="logo-section">
          <img
            src="/assets/logo/logo_temansinggah.svg"
            alt="Logo Teman Singgah"
            class="logo-icon" />
          <img
            src="/assets/logo/label_temansinggah.svg"
            alt="Brand Name Teman Singgah"
            class="logo-name" />
        </a>
        <div class="header-actions">
          <button class="ghost-button">Pertanyaan?</button>
          <button class="ghost-button">Simpan & keluar</button>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <div class="page-header">
        <h2>Tambahkan diskon untuk menarik tamu pertama</h2>
        <p>
          Host baru yang menawarkan diskon awal cenderung mendapatkan ulasan
          lebih cepat dan lebih banyak pemesanan. Anda bisa menonaktifkan ini
          kapan saja.
        </p>
      </div>

      <div class="discount-list">
        <label class="discount-item">
          <input type="checkbox" checked />
          <div class="discount-card">
            <div class="discount-badge">20%</div>
            <div class="discount-text">
              <h3>Diskon Tamu Baru</h3>
              <p>
                Berikan diskon 20% untuk 3 pemesanan pertama Anda. Cara terbaik
                untuk membangun ulasan awal.
              </p>
            </div>
            <div class="check-mark"><i class="ph-bold ph-check"></i></div>
          </div>
        </label>

        <label class="discount-item">
          <input type="checkbox" />
          <div class="discount-card">
            <div class="discount-badge">10%</div>
            <div class="discount-text">
              <h3>Diskon Mingguan</h3>
              <p>
                Diskon otomatis untuk tamu yang memesan 7 malam atau lebih.
                Cocok untuk meningkatkan tingkat hunian.
              </p>
            </div>
            <div class="check-mark"><i class="ph-bold ph-check"></i></div>
          </div>
        </label>

        <label class="discount-item">
          <input type="checkbox" />
          <div class="discount-card">
            <div class="discount-badge">15%</div>
            <div class="discount-text">
              <h3>Diskon Bulanan</h3>
              <p>
                Diskon otomatis untuk tamu yang memesan 28 malam atau lebih.
                Ideal untuk hunian jangka panjang.
              </p>
            </div>
            <div class="check-mark"><i class="ph-bold ph-check"></i></div>
          </div>
        </label>
      </div>
    </main>

    <footer class="onboarding-footer">
      <div class="progress-bar">
        <div class="progress-segment completed"></div>
        <div class="progress-segment completed"></div>
        <div class="progress-segment active"></div>
      </div>
      <div class="footer-actions">
        <a href="price.html" class="back-button">Kembali</a>
        <a href="safety.html" class="next-button">Selanjutnya</a>
      </div>
    </footer>
  </body>
</html>

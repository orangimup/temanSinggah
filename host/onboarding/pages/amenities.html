<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fasilitas | Teman Singgah</title>
    <link rel="icon" href="../../../assets/logo/logo_temansinggah.svg" />

    <link rel="stylesheet" href="../../../components/root.css" />
    <link rel="stylesheet" href="../../../components/navbar.css" />
    <link rel="stylesheet" href="../onboarding.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <script
      type="module"
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  </head>

  <body class="onboarding-page">
    <header class="navbar">
      <nav class="navbar-container">
        <a href="../../../index.html" class="logo-link"></a>
        <div class="logo-section">
          <img
            src="../../../assets/logo/logo_temansinggah.svg"
            alt="Logo Teman Singgah"
            class="logo-icon" />
          <img
            src="../../../assets/logo/label_temansinggah.svg"
            alt="Brand Name Teman Singgah"
            class="logo-name" />
        </div>
        <div class="header-actions">
          <a href="../../../user/pages/messages.html"
            ><button class="ghost-button">Pertanyaan?</button></a
          >
          <a href="../../../index.html"
            ><button class="ghost-button">Simpan & keluar</button></a
          >
        </div>
      </nav>
    </header>

    <main class="main-content wide">
      <div class="page-header">
        <h2>Ceritakan fasilitas yang Anda tawarkan</h2>
        <p>
          Pilih semua fasilitas yang tersedia. Anda selalu bisa menambah lebih
          banyak nanti.
        </p>
      </div>

      <div class="amenities-grid">
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-wifi-high"></i>
            </div>
            <h3>Wi-Fi</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-television"></i>
            </div>
            <h3>TV</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-thermometer-hot"></i>
            </div>
            <h3>AC / Pendingin Ruangan</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-cooking-pot"></i>
            </div>
            <h3>Dapur</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-washing-machine"></i>
            </div>
            <h3>Mesin Cuci</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-car"></i>
            </div>
            <h3>Parkir Gratis</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-swimming-pool"></i>
            </div>
            <h3>Kolam Renang</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-first-aid-kit"></i>
            </div>
            <h3>Kotak P3K</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-fire-extinguisher"></i>
            </div>
            <h3>Alat Pemadam</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-shower"></i>
            </div>
            <h3>Shower Air Panas</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-desk"></i>
            </div>
            <h3>Ruang Kerja</h3>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-dog"></i>
            </div>
            <h3>Ramah Hewan Peliharaan</h3>
          </div>
        </label>
      </div>
    </main>

    <footer class="onboarding-footer">
      <div class="progress-bar">
        <div class="progress-segment completed"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
      </div>
      <div class="footer-actions">
        <a href="stand_out.html" class="back-button">Kembali</a>
        <a href="photos.html" class="next-button">Selanjutnya</a>
      </div>
    </footer>
  </body>
</html>

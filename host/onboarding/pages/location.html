<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lokasi Properti | Teman Singgah</title>
    <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />

    <link rel="stylesheet" href="/components/root.css" />
    <link rel="stylesheet" href="/host/onboarding/onboarding.css" />
   
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <script
      type="module"
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  </head>

  <body class="onboarding-page">
    <header class="onboarding-header">
      <nav class="onboarding-nav">
        <a href="/index.html" class="logo-section">
          <img
            src="/assets/logo/logo_temansinggah.svg"
            alt="Logo Teman Singgah"
            class="logo-icon" />
          <img
            src="/assets/logo/label_temansinggah.svg"
            alt="Brand Name Teman Singgah"
            class="logo-name" />
        </a>
        <div class="header-actions">
          <button class="ghost-button">Pertanyaan?</button>
          <button class="ghost-button">Simpan & keluar</button>
        </div>
      </nav>
    </header>

    <main class="main-content wide">
      <div class="page-header">
        <h2>Di mana lokasi properti Anda?</h2>
        <p>
          Alamat lengkap Anda hanya akan dibagikan setelah tamu melakukan
          pemesanan. Sampai saat itu, mereka hanya akan melihat perkiraan
          lokasi.
        </p>
      </div>

      <div class="location-search">
        <i class="ph-fill ph-map-pin"></i>
        <input
          type="text"
          placeholder="Masukkan alamat lengkap"
          value="Jl. Jodipan Wetan III, Jodipan, Blimbing, Malang, 65121" />
      </div>

      <div class="map-placeholder">
        <img
          src="https://placehold.co/960x380/f0e4d8/c8b5a0?text="
          alt="Peta" />
        <div class="map-overlay">
          <div class="map-pin"><i class="ph-fill ph-map-pin"></i></div>
        </div>
      </div>
    </main>

    <footer class="onboarding-footer">
      <div class="progress-bar">
        <div class="progress-segment completed"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
      </div>
      <div class="footer-actions">
        <a href="privacy_type.html" class="back-button">Kembali</a>
        <a href="floor_plan.html" class="next-button">Selanjutnya</a>
      </div>
    </footer>
  </body>
</html>

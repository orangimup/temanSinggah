<div id="languageOverlay" class="language-overlay">
<div class="language-container">
  <button class="close-button" aria-label="Tutup">
    <i class="ph-bold ph-x"></i>
  </button>

  <div class="tab-group">
    <button class="tab-item active" data-target="#languageTab">
      Bahasa dan Wilayah
    </button>
    <button class="tab-item" data-target="#currencyTab">Mata Uang</button>
    <div class="tab-indicator"></div>
  </div>

  <div class="tab-content active" id="languageTab">
    <h2>Pilih bahasa dan wilayah</h2>
    <div class="language-grid">
      <label class="language-item">
        <input type="radio" name="language" value="indonesia" checked />
        <div class="language-card">
          <h3>Bahasa Indonesia</h3>
          <h4>Indonesia</h4>
        </div>
      </label>

      <label class="language-item">
        <input type="radio" name="language" value="english" />
        <div class="language-card">
          <h3>Bahasa Inggris</h3>
          <h4>Amerika Serikat</h4>
        </div>
      </label>
    </div>
  </div>

  <div class="tab-content" id="currencyTab">
    <h2>Pilih mata uang</h2>
    <div class="language-grid">
      <label class="language-item">
        <input type="radio" name="currency" value="idr" checked />
        <div class="language-card">
          <h3>Rupiah Indonesia</h3>
          <h4>IDR &ndash; Rp</h4>
        </div>
      </label>

      <label class="language-item">
        <input type="radio" name="currency" value="usd" />
        <div class="language-card">
          <h3>Dolar Amerika Serikat</h3>
          <h4>USD &ndash; $</h4>
        </div>
      </label>
    </div>
  </div>
</div>
</div>

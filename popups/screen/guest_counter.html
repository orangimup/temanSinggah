<?php
$stmt = mysqli_prepare($koneksi,
    "SELECT boleh_hewan, boleh_merokok FROM listing_policies WHERE listing_id = ?");
mysqli_stmt_bind_param($stmt, 'i', $listing['id']);
mysqli_stmt_execute($stmt);
$policies    = mysqli_stmt_get_result($stmt)->fetch_assoc();
mysqli_stmt_close($stmt);

$boleh_hewan = $policies ? (int)$policies['boleh_hewan'] : 1;
$max_tamu    = (int)($listing['max_tamu'] ?? 16);
?>

<div id="bookingGuestDropdown">
    <div class="counter-list"
         data-max-tamu="<?= $max_tamu ?>"
         data-boleh-hewan="<?= $boleh_hewan ?>">

        <div class="counter-row" data-group="dewasa" data-min="1" data-max="<?= $max_tamu ?>">
            <div class="counter-info">
                <h3 class="counter-label">Orang Dewasa</h3>
                <h4 class="counter-desc">17 Tahun ke Atas</h4>
            </div>
            <div class="counter-control">
                <button type="button" class="counter-button minus disabled" disabled>−</button>
                <span class="counter-value">1</span>
                <button type="button" class="counter-button plus">+</button>
            </div>
        </div>

        <div class="counter-row" data-group="anak" data-min="0" data-max="<?= $max_tamu ?>">
            <div class="counter-info">
                <h3 class="counter-label">Anak-anak</h3>
                <h4 class="counter-desc">2–17 Tahun</h4>
            </div>
            <div class="counter-control">
                <button type="button" class="counter-button minus disabled" disabled>−</button>
                <span class="counter-value">0</span>
                <button type="button" class="counter-button plus">+</button>
            </div>
        </div>

        <div class="counter-row" data-group="bayi" data-min="0" data-max="5">
            <div class="counter-info">
                <h3 class="counter-label">Bayi</h3>
                <h4 class="counter-desc">2 Tahun ke Bawah</h4>
            </div>
            <div class="counter-control">
                <button type="button" class="counter-button minus disabled" disabled>−</button>
                <span class="counter-value">0</span>
                <button type="button" class="counter-button plus">+</button>
            </div>
        </div>

        <div class="counter-row <?= !$boleh_hewan ? 'not-allowed' : '' ?>"
             data-group="hewan" data-min="0" data-max="5"
             data-allowed="<?= $boleh_hewan ?>">
            <div class="counter-info">
                <h3 class="counter-label">Hewan Peliharaan</h3>
                <?php if (!$boleh_hewan): ?>
                    <h4 class="counter-desc not-allowed-desc">Tidak diizinkan di properti ini</h4>
                <?php endif; ?>
            </div>
            <div class="counter-control">
                <button type="button" class="counter-button minus disabled" disabled>−</button>
                <span class="counter-value">0</span>
                <button type="button" class="counter-button plus <?= !$boleh_hewan ? 'disabled' : '' ?>"
                        <?= !$boleh_hewan ? 'disabled' : '' ?>>+</button>
            </div>
        </div>

    </div>
</div>

<script>
(function () {
    const dropdown   = document.getElementById('bookingGuestDropdown');
    const guestInput = document.querySelector('.guest-input');
    if (!dropdown || !guestInput) return;

    const list       = dropdown.querySelector('.counter-list');
    const maxTamu    = parseInt(list.dataset.maxTamu ?? 16);
    const bolehHewan = parseInt(list.dataset.bolehHewan ?? 1);

    if (!bolehHewan) {
        const hewanRow = dropdown.querySelector('[data-group="hewan"]');
        if (hewanRow) {
            hewanRow.classList.add('not-allowed');
            hewanRow.querySelectorAll('.counter-button').forEach(b => {
                b.classList.add('disabled');
                b.disabled = true;
            });
        }
    }

    function getValue(group) {
        const row = dropdown.querySelector(`[data-group="${group}"]`);
        return row ? parseInt(row.querySelector('.counter-value').textContent) : 0;
    }

    function totalTamu() {
        return getValue('dewasa') + getValue('anak');
    }

    function refreshButtons() {
        dropdown.querySelectorAll('.counter-row').forEach(row => {
            if (row.classList.contains('not-allowed')) return;

            const group    = row.dataset.group;
            const val      = getValue(group);
            const min      = parseInt(row.dataset.min ?? 0);
            const max      = parseInt(row.dataset.max ?? 16);
            const minusBtn = row.querySelector('.counter-button.minus');
            const plusBtn  = row.querySelector('.counter-button.plus');

            const canMinus = val > min;
            minusBtn.classList.toggle('disabled', !canMinus);
            minusBtn.disabled = !canMinus;

            let canPlus = val < max;
            if (group === 'dewasa' || group === 'anak') {
                canPlus = canPlus && totalTamu() < maxTamu;
            }
            plusBtn.classList.toggle('disabled', !canPlus);
            plusBtn.disabled = !canPlus;
        });
    }

    function updateGuestInput() {
        const dewasa = getValue('dewasa');
        const anak   = getValue('anak');
        const bayi   = getValue('bayi');
        const hewan  = getValue('hewan');

        const parts = [];
        if (dewasa > 0) parts.push(`${dewasa} Dewasa`);
        if (anak   > 0) parts.push(`${anak} Anak`);
        if (bayi   > 0) parts.push(`${bayi} Bayi`);
        if (hewan  > 0) parts.push(`${hewan} Hewan`);

        guestInput.value = parts.length ? parts.join(', ') : '1 Dewasa';
    }

    dropdown.addEventListener('click', function (e) {
        const btn = e.target.closest('.counter-button');
        if (!btn || btn.disabled || btn.classList.contains('disabled')) return;

        const row = btn.closest('.counter-row');
        if (!row || row.classList.contains('not-allowed')) return;

        const group   = row.dataset.group;
        const min     = parseInt(row.dataset.min ?? 0);
        const max     = parseInt(row.dataset.max ?? 16);
        const valueEl = row.querySelector('.counter-value');
        let val       = parseInt(valueEl.textContent);

        if (btn.classList.contains('plus')) {
            if ((group === 'dewasa' || group === 'anak') && totalTamu() >= maxTamu) return;
            if (val < max) valueEl.textContent = val + 1;
        } else {
            if (val > min) valueEl.textContent = val - 1;
        }

        refreshButtons();
        updateGuestInput();
    });

    guestInput.addEventListener('click', function (e) {
        e.stopPropagation();
        const rect = guestInput.getBoundingClientRect();
        dropdown.style.top   = (rect.bottom + window.scrollY + 6) + 'px';
        dropdown.style.left  = rect.left + 'px';
        dropdown.style.width = rect.width + 'px';
        dropdown.classList.toggle('open');
    });

    document.addEventListener('click', function (e) {
        if (!dropdown.contains(e.target) && e.target !== guestInput) {
            dropdown.classList.remove('open');
        }
    });

    refreshButtons();
    updateGuestInput();
})();
</script>
